<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arXiv curator — settings</title>
<style>
  :root {
    --red: #b31b1b; --red-dark: #440a0a; --red-light: #f9f0f0;
    --blue: #1777bc; --blue-dark: #005e9d;
    --bg: #ffffff; --bg-alt: #f5f5f5;
    --border: #cccccc; --text: #000000; --text-dim: #757575; --text-mid: #333333;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Lucida Grande', Helvetica, Arial, Verdana, sans-serif;
    background: var(--bg); color: var(--text); font-size: 90%; line-height: 1.5; }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; color: var(--blue-dark); }

  .identity-bar { background: #222; height: 8px; }
  .header {
    background: var(--red); padding: 0.6rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    border-bottom: 2px solid var(--border);
  }
  .header-brand { font-size: 1.3em; font-weight: bold; color: #fff; }
  .header-brand span { font-weight: normal; opacity: 0.85; }
  .btn {
    font-family: inherit; font-size: 0.8em; padding: 0.3em 0.75em;
    border: 1px solid transparent; background: rgba(255,255,255,0.15);
    color: #fff; cursor: pointer; border-radius: 2px; text-decoration: none;
    display: inline-block; white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.28); text-decoration: none; color: #fff; }

  .main { max-width: 520px; margin: 0 auto; padding: 2rem 1.5rem; }

  .section-title {
    font-size: 1em; font-weight: bold; color: var(--text-mid);
    margin-bottom: 1.25rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
    margin-top: 2rem;
  }
  .section-title:first-child { margin-top: 0; }

  .field { margin-bottom: 1.25rem; }
  .field-label {
    font-size: 0.8em; font-weight: bold; color: var(--text-mid);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; display: block;
  }
  .field-desc { font-size: 0.78em; color: var(--text-dim); margin-top: 0.3rem; }

  .toggle-row { display: flex; align-items: center; gap: 0.6rem; }
  .toggle-row label { font-size: 0.9em; color: var(--text-mid); cursor: pointer; }

  select {
    font-family: inherit; font-size: 0.88em; padding: 0.3em 0.6em;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    border-radius: 2px; outline: none; cursor: pointer;
  }
  select:focus { border-color: var(--blue); }

  .text-input {
    font-family: inherit; font-size: 0.88em; padding: 0.3em 0.6em;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    border-radius: 2px; outline: none; width: 100%;
  }
  .text-input:focus { border-color: var(--blue); }

  .checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
  .checkbox-row input { accent-color: var(--red); cursor: pointer; width: 14px; height: 14px; }
  .checkbox-row label { font-size: 0.88em; color: var(--text-mid); cursor: pointer; }
  .checkbox-desc { font-size: 0.78em; color: var(--text-dim); margin-left: 1.6rem; margin-top: -0.2rem; margin-bottom: 0.5rem; }

  .save-btn {
    font-family: inherit; font-size: 0.88em; padding: 0.4em 1.2em;
    border: none; background: var(--red); color: #fff;
    cursor: pointer; border-radius: 2px; transition: background 0.15s;
  }
  .save-btn:hover { background: var(--red-dark); }
  .save-btn:disabled { background: #ccc; cursor: default; }

  .status { font-size: 0.82em; color: var(--text-dim); margin-left: 0.75rem; }
  .status.ok { color: #009917; }
  .status.err { color: var(--red); }

  .disabled-overlay { opacity: 0.4; pointer-events: none; }

  .day-checkboxes { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.4rem; }
  .day-label {
    display: flex; align-items: center; gap: 0.3rem;
    font-size: 0.85em; color: var(--text-mid); cursor: pointer;
    border: 1px solid var(--border); border-radius: 2px;
    padding: 0.2em 0.5em; user-select: none;
  }
  .day-label input { accent-color: var(--red); cursor: pointer; width: 13px; height: 13px; }
  .inline-num {
    width: 4em; font-family: inherit; font-size: 1em;
    padding: 0.1em 0.3em; border: 1px solid var(--border);
    border-radius: 2px; text-align: center; outline: none;
  }
  .inline-num:focus { border-color: var(--blue); }

  @media (max-width: 600px) {
    .header { padding: 0.5rem 1rem; }
    .main { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<div class="identity-bar"></div>
<div class="header">
  <div class="header-brand">arXiv curator <span>// settings</span></div>
  <div><a class="btn" href="/">← back</a></div>
</div>

<div class="main">

  <!-- Display -->
  <div class="section-title">Display</div>

  <div class="field">
    <span class="field-label">Startup categories</span>
    <input class="text-input" id="startup_categories" type="text"
      placeholder="e.g. hep-th; quant-ph; gr-qc">
    <div class="field-desc">Categories selected by default when the site opens, separated by <code>;</code>. Leave empty to select all.</div>
  </div>

  <!-- Keyword digest -->
  <div class="section-title">Keyword digest</div>

  <div class="field">
    <div class="toggle-row">
      <input type="checkbox" id="kw_enabled" onchange="updateDisabled()">
      <label for="kw_enabled">Send me relevant papers</label>
    </div>
  </div>

  <div id="kw-body">
    <div class="field">
      <span class="field-label">Days</span>
      <div class="day-checkboxes">
        <label class="day-label"><input type="checkbox" class="kw-day" value="0"> Mon</label>
        <label class="day-label"><input type="checkbox" class="kw-day" value="1"> Tue</label>
        <label class="day-label"><input type="checkbox" class="kw-day" value="2"> Wed</label>
        <label class="day-label"><input type="checkbox" class="kw-day" value="3"> Thu</label>
        <label class="day-label"><input type="checkbox" class="kw-day" value="4"> Fri</label>
      </div>
    </div>
    <div class="field">
      <div style="font-size:0.88em;color:var(--text-mid);display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">
        Up to <input type="number" class="inline-num" id="kw_limit" min="1" max="200" value="20">
        papers, ranked by number of keyword matches.
      </div>
    </div>
  </div>

  <!-- Followed authors digest -->
  <div class="section-title" style="margin-top:2rem;">Followed authors digest</div>

  <div class="field">
    <div class="toggle-row">
      <input type="checkbox" id="auth_enabled" onchange="updateDisabled()">
      <label for="auth_enabled">Send me papers by followed authors</label>
    </div>
  </div>

  <div id="auth-body">
    <div class="field">
      <span class="field-label">Days</span>
      <div class="day-checkboxes">
        <label class="day-label"><input type="checkbox" class="auth-day" value="0"> Mon</label>
        <label class="day-label"><input type="checkbox" class="auth-day" value="1"> Tue</label>
        <label class="day-label"><input type="checkbox" class="auth-day" value="2"> Wed</label>
        <label class="day-label"><input type="checkbox" class="auth-day" value="3"> Thu</label>
        <label class="day-label"><input type="checkbox" class="auth-day" value="4"> Fri</label>
      </div>
    </div>
  </div>

  <div style="display:flex;align-items:center;margin-top:0.5rem;">
    <button class="save-btn" onclick="save()">Save</button>
    <span class="status" id="status"></span>
  </div>

</div>

<script>
async function load() {
  const r = await fetch('/api/email-prefs');
  const p = await r.json();
  document.getElementById('startup_categories').value = p.startup_categories || '';

  document.getElementById('kw_enabled').checked = p.kw_enabled ?? true;
  const kwDays = p.kw_days || [4];
  document.querySelectorAll('.kw-day').forEach(cb => { cb.checked = kwDays.includes(parseInt(cb.value)); });
  document.getElementById('kw_limit').value = p.kw_limit ?? 20;

  document.getElementById('auth_enabled').checked = p.auth_enabled ?? false;
  const authDays = p.auth_days || [4];
  document.querySelectorAll('.auth-day').forEach(cb => { cb.checked = authDays.includes(parseInt(cb.value)); });

  updateDisabled();
}

function updateDisabled() {
  document.getElementById('kw-body').classList.toggle('disabled-overlay', !document.getElementById('kw_enabled').checked);
  document.getElementById('auth-body').classList.toggle('disabled-overlay', !document.getElementById('auth_enabled').checked);
}

async function save() {
  const btn = document.querySelector('.save-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'saving…';
  status.className = 'status';

  const body = {
    startup_categories: document.getElementById('startup_categories').value.trim(),
    kw_enabled: document.getElementById('kw_enabled').checked,
    kw_days: [...document.querySelectorAll('.kw-day:checked')].map(cb => parseInt(cb.value)),
    kw_limit: Math.max(1, parseInt(document.getElementById('kw_limit').value) || 20),
    auth_enabled: document.getElementById('auth_enabled').checked,
    auth_days: [...document.querySelectorAll('.auth-day:checked')].map(cb => parseInt(cb.value)),
  };

  try {
    const r = await fetch('/api/email-prefs', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const d = await r.json();
    status.textContent = d.ok ? 'saved!' : 'error saving';
    status.className = 'status ' + (d.ok ? 'ok' : 'err');
  } catch (e) {
    status.textContent = 'error saving';
    status.className = 'status err';
  }
  btn.disabled = false;
}

load();
</script>
</body>
</html>
