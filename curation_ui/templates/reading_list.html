<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arXiv curator — reading list</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="window._katexReady=true"></script>
<style>
  :root {
    --red: #b31b1b; --red-dark: #440a0a; --red-light: #f9f0f0;
    --blue: #1777bc; --blue-dark: #005e9d;
    --orange: #d47500; --orange-bg: #fffbf0;
    --bg: #ffffff; --bg-alt: #f5f5f5; --bg-beige: #f7f5f3;
    --border: #cccccc; --text: #000000; --text-dim: #757575; --text-mid: #333333;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Lucida Grande', Helvetica, Arial, Verdana, sans-serif;
    background: var(--bg); color: var(--text); font-size: 90%; line-height: 1.5; }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; color: var(--blue-dark); }

  .identity-bar { background: #222; height: 8px; }
  .header {
    background: var(--red); padding: 0.6rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    border-bottom: 2px solid var(--border);
  }
  .header-brand { font-size: 1.3em; font-weight: bold; color: #fff; }
  .header-brand span { font-weight: normal; opacity: 0.85; }
  .btn {
    font-family: inherit; font-size: 0.8em; padding: 0.3em 0.75em;
    border: 1px solid transparent; background: rgba(255,255,255,0.15);
    color: #fff; cursor: pointer; border-radius: 2px; text-decoration: none;
    display: inline-block; white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.28); text-decoration: none; color: #fff; }

  .main { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
  .page-title {
    font-size: 1.1em; font-weight: bold; color: var(--text-mid);
    margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
  }
  .empty-note { color: var(--text-dim); font-style: italic; padding: 2rem 0; }

  .paper {
    border-bottom: 1px solid var(--border); padding: 0.9rem 0;
    padding-left: 0.5rem; margin-left: -0.5rem; border-left: 3px solid transparent;
    cursor: pointer; transition: background 0.1s;
  }
  .paper:hover { background: var(--bg-beige); }
  .paper-title { font-size: 1.1em; font-weight: bold; line-height: 1.35; margin-bottom: 0.2rem; }
  .paper-title a { color: var(--text); }
  .paper-title a:hover { color: var(--blue); text-decoration: underline; }
  .paper-authors { font-size: 0.95em; color: var(--text-mid); margin-bottom: 0.15rem; }
  .paper-meta {
    font-size: 0.83em; color: var(--text-dim);
    display: flex; flex-wrap: wrap; gap: 0.15rem 0.7rem; margin-bottom: 0.15rem;
  }
  .primary-cat { font-weight: bold; color: var(--text-mid); }
  .paper-abstract {
    font-size: 0.93em; color: var(--text-mid); margin-top: 0.4rem;
    display: none; line-height: 1.65;
    background: var(--bg-beige); padding: 0.75rem 1rem;
    border-left: 2px solid var(--border);
  }
  .paper.expanded .paper-abstract { display: block; }
  .paper-links { display: flex; gap: 0.4rem; margin-top: 0.45rem; }
  .action-btn {
    font-family: inherit; font-size: 0.78em; padding: 0.25em 0.6em;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-mid); cursor: pointer; border-radius: 2px;
    transition: all 0.1s; text-decoration: none; display: inline-block;
  }
  .action-btn:hover { border-color: var(--red); color: var(--red); text-decoration: none; }
  .action-btn.remove:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }
  .loading { padding: 3rem 0; color: var(--text-dim); font-style: italic; }
</style>
</head>
<body>
<div class="identity-bar"></div>
<div class="header">
  <div class="header-brand">arXiv curator <span>// reading list</span></div>
  <a class="btn" href="/">back to papers</a>
</div>
<div class="main">
  <div class="page-title" id="page-title">reading list</div>
  <div id="papers"><div class="loading">loading…</div></div>
</div>
<script>
let papers = [];

async function load() {
  const d = await (await fetch('/api/reading_list')).json();
  papers = d.papers;
  render();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderLatex() {
  if (!window._katexReady) return;
  renderMathInElement(document.getElementById('papers'), {
    delimiters: [
      {left:'$$',right:'$$',display:true}, {left:'$',right:'$',display:false},
      {left:'\\(',right:'\\)',display:false}, {left:'\\[',right:'\\]',display:true}
    ],
    throwOnError: false
  });
}

async function remove(id) {
  await fetch('/api/reading_list/remove', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });
  papers = papers.filter(p => p.id !== id);
  render();
}

function toggleExpand(el, e) {
  if (e.target.closest('.paper-links') || e.target.tagName === 'A') return;
  el.classList.toggle('expanded');
  if (el.classList.contains('expanded')) renderLatex();
}

function render() {
  const title = document.getElementById('page-title');
  title.textContent = `reading list (${papers.length} paper${papers.length !== 1 ? 's' : ''})`;

  const el = document.getElementById('papers');
  if (!papers.length) {
    el.innerHTML = '<div class="empty-note">no papers saved yet — click ☆ save on any paper to add it here</div>';
    return;
  }

  el.innerHTML = papers.map(p => {
    const authors = (p.authors || []).slice(0, 10).join(', ')
      + (p.authors && p.authors.length > 10 ? ' et al.' : '');
    const otherCats = (p.categories || []).filter(c => c !== p.primary_category);
    return `
    <div class="paper" onclick="toggleExpand(this, event)">
      <div class="paper-title">
        <a href="${p.url}" target="_blank" onclick="event.stopPropagation()">${escHtml(p.title || '')}</a>
      </div>
      <div class="paper-authors">${escHtml(authors)}</div>
      <div class="paper-meta">
        <span class="primary-cat">${escHtml(p.primary_category || '')}</span>
        <span>${otherCats.map(c => escHtml(c)).join(' ')}</span>
        <span>${p.published ? p.published.slice(0, 10) : ''}</span>
      </div>
      <div class="paper-abstract">${escHtml(p.abstract || '')}</div>
      <div class="paper-links">
        <a class="action-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()">abstract</a>
        ${p.pdf_url ? `<a class="action-btn" href="${p.pdf_url}" target="_blank" onclick="event.stopPropagation()">pdf</a>` : ''}
        <button class="action-btn remove" onclick="event.stopPropagation(); remove('${escHtml(p.id)}')">remove</button>
      </div>
    </div>`;
  }).join('');

  renderLatex();
}

load();
</script>
</body>
</html>
