<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arXiv curator — all papers</title>
<style>
  :root {
    --red:       #b31b1b;
    --red-dark:  #440a0a;
    --red-light: #f9f0f0;
    --blue:      #1777bc;
    --blue-dark: #005e9d;
    --blue-bg:   #f0f6fc;
    --green:     #009917;
    --green-bg:  #f0faf0;
    --orange:    #d47500;
    --orange-bg: #fffbf0;
    --bg:        #ffffff;
    --bg-alt:    #f5f5f5;
    --bg-beige:  #f7f5f3;
    --border:    #cccccc;
    --text:      #000000;
    --text-dim:  #757575;
    --text-mid:  #333333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lucida Grande', Helvetica, Arial, Verdana, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 90%;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; color: var(--blue-dark); }

  .identity-bar { background: #222; height: 8px; flex-shrink: 0; }

  .header {
    background: var(--red);
    padding: 0.6rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    z-index: 100;
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }
  .header-brand { font-size: 1.3em; font-weight: bold; color: #fff; white-space: nowrap; }
  .header-brand span { font-weight: normal; opacity: 0.85; }
  .header-right { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .stats { font-size: 0.95em; color: var(--text); white-space: nowrap; margin-right: 0.25rem; }

  .btn {
    font-family: inherit; font-size: 0.8em; padding: 0.3em 0.75em;
    border: 1px solid transparent; background: rgba(255,255,255,0.15);
    color: #fff; cursor: pointer; border-radius: 2px; transition: background 0.15s;
    text-decoration: none; display: inline-block; white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.28); text-decoration: none; color: #fff; }
  .btn-white { background: #fff; color: var(--red); font-weight: bold; border-color: #fff; }
  .btn-white:hover { background: #f0f0f0; color: var(--red-dark); }

  /* Search bar */
  .search-bar {
    padding: 0.55rem 1.5rem; border-bottom: 1px solid var(--border);
    background: var(--bg-alt); flex-shrink: 0;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .search-label { font-size: 0.85em; color: var(--text-dim); white-space: nowrap; }
  .search-input {
    flex: 1; font-family: inherit; font-size: 0.85em;
    padding: 0.3em 0.6em; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); border-radius: 2px;
    box-shadow: inset 0 1px 2px rgba(10,10,10,0.08); outline: none; max-width: 480px;
  }
  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--text-dim); }

  /* Body */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 230px; flex-shrink: 0; border-right: 1px solid var(--border);
    overflow-y: auto; padding: 0.9rem 0.85rem 2rem; background: var(--bg-alt);
  }

  .sidebar-section { margin-bottom: 1.1rem; }

  .sidebar-section-title {
    font-size: 0.75em; font-weight: bold; color: var(--text-mid);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 0.45rem; padding-bottom: 0.2rem;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none;
  }
  .sidebar-section-title:hover { color: var(--red); }
  .sidebar-section-title .section-arrow { font-size: 0.8em; color: var(--text-dim); }
  .sidebar-section-body { overflow: hidden; }
  .sidebar-section-body.collapsed { display: none; }

  .sb-row { display: flex; gap: 0.35rem; margin-bottom: 0.45rem; flex-wrap: wrap; }

  .sb-btn {
    font-family: inherit; font-size: 0.72em; padding: 0.2em 0.5em;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-mid); cursor: pointer; border-radius: 2px; transition: all 0.1s;
  }
  .sb-btn:hover { border-color: var(--red); color: var(--red); }
  .sb-btn-active { border-color: var(--red); color: var(--red); background: var(--red-light); }
  .sb-btn-group { font-size: 0.88em; }

  /* Followed authors / keywords filter row */
  .filter-row {
    display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.4rem;
  }
  .filter-row input[type="checkbox"] { accent-color: var(--blue); cursor: pointer; }
  .filter-row label { font-size: 0.78em; color: var(--text-mid); cursor: pointer; }

  /* Item lists (authors / keywords) */
  .item-list { display: flex; flex-direction: column; gap: 0.15rem; margin-bottom: 0.4rem; }

  .item-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.76em; color: var(--text-mid); padding: 0.1rem 0; gap: 0.25rem;
  }
  .item-row .item-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-row .item-weight {
    font-size: 0.85em; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 2px; padding: 0 0.3em;
    background: var(--bg); min-width: 2.5em; text-align: center;
  }
  .item-row .rm-btn {
    border: none; background: none; cursor: pointer;
    color: var(--text-dim); font-size: 0.8em; padding: 0.1rem 0.25rem;
    border-radius: 2px; flex-shrink: 0; line-height: 1;
  }
  .item-row .rm-btn:hover { color: var(--red); background: var(--red-light); }

  .empty-note { font-size: 0.75em; color: var(--text-dim); font-style: italic; line-height: 1.4; }

  /* Add keyword form */
  .add-form { display: flex; gap: 0.3rem; margin-top: 0.3rem; }
  .add-input {
    flex: 1; font-family: inherit; font-size: 0.75em;
    padding: 0.25em 0.4em; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); border-radius: 2px; outline: none; min-width: 0;
  }
  .add-input:focus { border-color: var(--blue); }
  .add-submit {
    font-family: inherit; font-size: 0.72em; padding: 0.25em 0.5em;
    border: 1px solid var(--red); background: var(--red); color: #fff;
    cursor: pointer; border-radius: 2px; white-space: nowrap;
  }
  .add-submit:hover { background: var(--red-dark); }

  /* Submission type badge */
  .type-badge {
    display: inline-block; font-size: 0.72em; padding: 0.05em 0.4em;
    border-radius: 2px; border: 1px solid; margin-left: 0.3em;
    vertical-align: middle; font-weight: normal;
  }
  .type-new         { color: var(--green);  border-color: var(--green);  background: var(--green-bg); }
  .type-cross       { color: var(--blue);   border-color: var(--blue);   background: var(--blue-bg); }
  .type-replacement { color: var(--text-dim); border-color: var(--border); background: var(--bg-alt); }

  /* Category list */
  .cat-group { margin-bottom: 0.2rem; }

  .cat-group-header {
    display: flex; align-items: center; gap: 0.3rem;
    padding: 0.1rem 0; cursor: default;
  }
  .collapse-btn {
    border: none; background: none; cursor: pointer; padding: 0;
    color: var(--text-dim); font-size: 0.75em; line-height: 1;
    width: 1em; text-align: center; flex-shrink: 0;
  }
  .collapse-btn:hover { color: var(--red); }
  .cat-group-header input[type="checkbox"] { accent-color: var(--red); cursor: pointer; width: 12px; height: 12px; flex-shrink: 0; }
  .cat-group-label {
    font-size: 0.78em; font-weight: bold; color: var(--red);
    cursor: pointer; user-select: none; flex: 1;
  }
  .cat-group-label:hover { color: var(--red-dark); text-decoration: underline; }
  .cat-group-count { font-size: 0.7em; color: var(--text-dim); }

  .cat-group-items { overflow: hidden; }
  .cat-group-items.collapsed { display: none; }

  .cat-item {
    display: flex; align-items: center; gap: 0.35rem;
    padding: 0.07rem 0 0.07rem 1.4rem;
  }
  .cat-item input[type="checkbox"] { accent-color: var(--red); cursor: pointer; width: 12px; height: 12px; flex-shrink: 0; }
  .cat-item label {
    font-size: 0.75em; color: var(--text-dim); cursor: pointer;
    display: flex; justify-content: space-between; width: 100%; gap: 0.4rem;
  }
  .cat-item input:checked + label { color: var(--text-mid); }
  .cat-count { color: #bbb; font-size: 0.9em; }

  /* Papers panel */
  .papers-panel { flex: 1; overflow-y: auto; padding: 0 1.5rem 4rem; }

  .paper {
    border-bottom: 1px solid var(--border); padding: 0.9rem 0;
    padding-left: 0.5rem; margin-left: -0.5rem; border-left: 3px solid transparent;
    cursor: pointer; transition: background 0.1s;
  }
  .paper:hover { background: var(--bg-beige); }
  .paper.has-followed { border-left-color: var(--blue); background: var(--blue-bg); }
  .paper.has-followed:hover { background: #e8f2fb; }
  .paper.has-keyword { border-left-color: var(--orange); background: var(--orange-bg); }
  .paper.has-keyword.has-followed { border-left-color: var(--blue); }

  .paper-title { font-size: 1.1em; font-weight: bold; line-height: 1.35; margin-bottom: 0.2rem; }
  .paper-title a { color: var(--text); }
  .paper-title a:hover { color: var(--blue); text-decoration: underline; }

  .paper-authors { font-size: 0.95em; color: var(--text-mid); margin-bottom: 0.15rem; }
  .author-name { cursor: pointer; transition: color 0.1s; }
  .author-name:hover { color: var(--blue); text-decoration: underline; }
  .author-name.followed { color: var(--blue); font-weight: bold; }

  .author-menu {
    position: fixed; z-index: 500;
    background: var(--bg); border: 1px solid var(--border);
    box-shadow: 0 3px 10px rgba(0,0,0,0.15); border-radius: 3px;
    min-width: 160px; padding: 0.25rem 0;
    font-size: 0.85em;
  }
  .author-menu-name {
    padding: 0.35rem 0.75rem; font-weight: bold; color: var(--text-mid);
    border-bottom: 1px solid var(--border); font-size: 0.9em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
  }
  .author-menu-item {
    display: block; width: 100%; text-align: left;
    padding: 0.35rem 0.75rem; background: none; border: none;
    font-family: inherit; font-size: 1em; color: var(--text-mid);
    cursor: pointer; white-space: nowrap;
  }
  .author-menu-item:hover { background: var(--bg-alt); color: var(--red); }
  .authors-full { display: none; }
  .paper.expanded .authors-short { display: none; }
  .paper.expanded .authors-full { display: inline; }

  .paper-meta {
    font-size: 0.83em; color: var(--text-dim);
    display: flex; flex-wrap: wrap; gap: 0.15rem 0.7rem;
    margin-bottom: 0.15rem; align-items: baseline;
  }
  .primary-cat { font-weight: bold; color: var(--text-mid); }

  .kw-matches {
    font-size: 0.8em; color: var(--orange); margin-bottom: 0.1rem;
  }
  .kw-score { font-weight: bold; margin-right: 0.3em; }

  .paper-abstract {
    font-size: 0.93em; color: var(--text-mid); margin-top: 0.4rem;
    display: none; line-height: 1.65;
    background: var(--bg-beige); padding: 0.75rem 1rem;
    border-left: 2px solid var(--border);
  }
  .paper.expanded .paper-abstract { display: block; }

  .paper-links { display: flex; gap: 0.4rem; margin-top: 0.45rem; }
  .action-btn {
    font-family: inherit; font-size: 0.78em; padding: 0.25em 0.6em;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-mid); cursor: pointer; border-radius: 2px;
    transition: all 0.1s; text-decoration: none; display: inline-block;
  }
  .action-btn:hover { border-color: var(--red); color: var(--red); text-decoration: none; }

  .group-header-l1, .group-header-l2 { cursor: pointer; user-select: none; }
  .group-header-l1:hover { color: var(--red-dark); }
  .group-header-l2:hover { color: var(--text); }
  .group-arrow { font-size: 0.7em; margin-right: 0.35em; color: var(--text-dim); }
  .group-header-l1 {
    font-size: 1.25em; font-weight: bold; color: var(--red);
    padding: 1rem 0 0.3rem; border-bottom: 2px solid var(--red);
    margin-bottom: 0.1rem;
  }
  .group-header-l2 {
    font-size: 0.88em; font-weight: bold; color: var(--text-mid);
    padding: 0.7rem 0 0.2rem; border-bottom: 1px solid var(--border);
    margin-bottom: 0.1rem; padding-left: 0.5rem;
  }
  .group-header-l1 .group-count,
  .group-header-l2 .group-count { font-weight: normal; color: var(--text-dim); font-size: 0.8em; margin-left: 0.5em; }

  .highlight { background: #fff176; border-radius: 1px; }
  .loading { text-align: center; padding: 3rem 1.5rem; color: var(--text-dim); font-style: italic; }

  /* Bookmark button */
  .action-btn.bookmarked { border-color: var(--orange); color: var(--orange); background: var(--orange-bg); }
  .action-btn.bookmarked:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

  /* Sidebar drawer toggle (hidden on desktop) */
  .sidebar-toggle {
    display: none;
    font-family: inherit; font-size: 0.82em; padding: 0.3em 0.65em;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-mid); cursor: pointer; border-radius: 2px; white-space: nowrap; flex-shrink: 0;
  }

  /* Backdrop for mobile sidebar */
  .sidebar-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.38); z-index: 299;
  }

  @media (max-width: 700px) {
    body { height: 100dvh; font-size: 95%; }

    .identity-bar { height: 4px; }

    .header { padding: 0.5rem 0.9rem; flex-wrap: wrap; gap: 0.4rem; }
    .header-brand { font-size: 1.1em; }

    .search-bar { padding: 0.4rem 0.75rem; gap: 0.4rem; flex-wrap: wrap; }
    .search-label { display: none; }
    .search-input { max-width: none; min-width: 0; }
    .search-expand-btns { display: none; }
    .search-group-btns { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .sidebar-toggle { display: block; }

    .sidebar {
      position: fixed;
      left: -105%; top: 0; bottom: 0;
      height: 100%; width: 82vw; max-width: 300px;
      z-index: 300;
      transition: left 0.22s ease, transform 0.22s ease;
      box-shadow: 3px 0 14px rgba(0,0,0,0.18);
    }
    .sidebar.open { left: 0; }
    .sidebar-backdrop.open { display: block; }

    .papers-panel { padding: 0 0.9rem 4rem; }

    .paper { padding: 0.8rem 0; }
    .paper-title { font-size: 1em; }
    .paper-abstract { padding: 0.6rem 0.75rem; }
    .paper-links { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="identity-bar"></div>

<div class="header">
  <div class="header-brand">arXiv curator <span id="header-date">// {{ date }}</span></div>
  <div class="header-right">
    <button class="btn btn-white" id="toggle-day" onclick="setView('day')">day</button>
    <button class="btn" id="toggle-week" onclick="setView('week')">week</button>
    <a class="btn btn-white" href="/reading-list">reading list <span id="rl-count"></span></a>
    <a class="btn" href="/settings">settings</a>
    <a class="btn" href="/logout">log out</a>
  </div>
</div>

<div class="search-bar">
  <button class="sidebar-toggle" onclick="toggleSidebar()">filters</button>
  <span class="search-label">search:</span>
  <input class="search-input" id="search" type="text"
    placeholder="keyword1 && keyword2 && …" oninput="onSearch(this.value)">
  <span class="stats" id="stats"></span>
  <span class="search-expand-btns">
    <button class="sb-btn" id="btn-expand-all" onclick="toggleExpandAll()">expand all</button>
  </span>
  <span class="search-group-btns">
    <button class="sb-btn sb-btn-group" id="btn-sep-fields" onclick="toggleGroup('field')">Fields</button>
    <button class="sb-btn sb-btn-group" id="btn-sep-type" onclick="toggleGroup('type')">Submission type</button>
  </span>
</div>

<div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

<div class="body">
  <aside class="sidebar">

    <!-- Followed authors -->
    <div class="sidebar-section">
      <div class="sidebar-section-title" onclick="toggleSection(this)">
        followed authors <span class="section-arrow">▼</span>
      </div>
      <div class="sidebar-section-body">
        <div class="filter-row">
          <input type="checkbox" id="cb-followed" onchange="render()">
          <label for="cb-followed">show only followed</label>
        </div>
        <div class="item-list" id="followed-list">
          <span class="empty-note">click an author name to follow</span>
        </div>
        <div class="add-form">
          <input class="add-input" id="author-name" type="text" placeholder="add author…"
            onkeydown="if(event.key==='Enter') addAuthor()">
          <button class="add-submit" onclick="addAuthor()">+</button>
        </div>
      </div>
    </div>

    <!-- Keywords -->
    <div class="sidebar-section">
      <div class="sidebar-section-title" onclick="toggleSection(this)">
        keywords <span class="section-arrow">▼</span>
      </div>
      <div class="sidebar-section-body">
        <div class="filter-row">
          <input type="checkbox" id="cb-keywords" onchange="render()">
          <label for="cb-keywords">show only keyword matches</label>
        </div>
        <div class="item-list" id="keyword-list">
          <span class="empty-note">no keywords yet</span>
        </div>
        <div class="add-form">
          <input class="add-input" id="kw-name" type="text" placeholder="add keyword…"
            onkeydown="if(event.key==='Enter') addKeyword()">
          <button class="add-submit" onclick="addKeyword()">+</button>
        </div>
      </div>
    </div>

    <!-- Categories -->
    <div class="sidebar-section">
      <div class="sidebar-section-title" onclick="toggleSection(this)">
        categories <span class="section-arrow">▼</span>
      </div>
      <div class="sidebar-section-body">
        <div class="sb-row">
          <button class="sb-btn" onclick="selectAllCats()">all</button>
          <button class="sb-btn" onclick="selectNoneCats()">none</button>
          <button class="sb-btn" onclick="selectStartupCats()">startup</button>
          <button class="sb-btn" id="btn-groups" onclick="toggleGroupsExpand()">expand</button>
        </div>
        <input class="add-input" id="cat-search" type="text" placeholder="search categories…"
          oninput="onCatSearch(this.value)" style="width:100%;margin-bottom:0.4rem;">
        <div id="cat-list"><span class="empty-note">loading…</span></div>
      </div>
    </div>

  </aside>

  <div class="papers-panel">
    <div id="papers"><div class="loading">loading papers…</div></div>
  </div>
</div>

<script>

async function load() {
  const [papersRes, authorsRes, kwRes, rlRes, prefsRes] = await Promise.all([
    fetch(`/api/papers?date=${DATE}`),
    fetch('/api/authors'),
    fetch('/api/keywords'),
    fetch('/api/reading_list'),
    fetch('/api/email-prefs'),
  ]);
  papers = (await papersRes.json()).papers;
  followedAuthors = new Set((await authorsRes.json()).authors);
  keywords = (await kwRes.json()).keywords;
  readingListIds = new Set((await rlRes.json()).papers.map(p => baseId(p.id)));
  const prefs = await prefsRes.json();
  startupCats = (prefs.startup_categories || '')
    .split(';').map(s => s.trim().toLowerCase()).filter(Boolean);

  const savedCats = sessionStorage.getItem('selectedCats');
  if (savedCats) {
    JSON.parse(savedCats).forEach(c => selectedCats.add(c));
  } else {
    Object.keys(categoryCounts()).forEach(c => { if (matchesStartup(c)) selectedCats.add(c); });
  }
  buildCategoryList();
  document.querySelectorAll('.cat-group').forEach(group => {
    const top = group.id.replace('group-', '');
    const items = document.getElementById(`items-${top}`);
    const btn = group.querySelector('.collapse-btn');
    if (!items) return;
    const hasSelected = [...items.querySelectorAll('input[type="checkbox"]')].some(cb => cb.checked);
    if (!hasSelected) { items.classList.add('collapsed'); if (btn) btn.textContent = '▶'; }
  });
  renderFollowedSidebar();
  renderKeywordSidebar();
  updateRlCount();
  document.getElementById('btn-sep-fields').classList.toggle('sb-btn-active', groupOrder.includes('field'));
  document.getElementById('btn-sep-type').classList.toggle('sb-btn-active', groupOrder.includes('type'));
  render();
  if (sessionStorage.getItem('allExpanded') === 'true') expandAll();
}

/* ── Utilities ── */

// Thin wrapper for JSON POST requests to our Flask API endpoints.
async function apiPost(endpoint, body) {
  const r = await fetch(endpoint, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  return r.json();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function highlight(text) {
  if (!searchQuery) return escHtml(text);
  let out = escHtml(text);
  searchTerms().forEach(phrase => {
    const re = new RegExp(phrase.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
    out = out.replace(re, m => `<mark class="highlight">${m}</mark>`);
  });
  return out;
}

function renderLatex() {
  if (!window._katexReady) return;
  renderMathInElement(document.getElementById('papers'), {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$',  right: '$',  display: false},
      {left: '\\(', right: '\\)', display: false},
      {left: '\\[', right: '\\]', display: true}
    ],
    throwOnError: false
  });
}

/* ── Keyword scoring ── */

function scoreKeywords(paper) {
  if (!keywords.length) return {score: 0, matched: []};
  const text = ((paper.title || '') + ' ' + (paper.abstract || '')).toLowerCase();
  const matched = keywords.filter(kw => text.includes(kw.toLowerCase()));
  return {score: matched.length, matched};
}

/* ── Category list ── */

function categoryCounts() {
  const counts = {};
  papers
    .filter(p => !readingListIds.has(baseId(p.id)))
    .forEach(p => (p.categories || []).forEach(c => { counts[c] = (counts[c] || 0) + 1; }));
  return counts;
}

function buildCategoryList() {
  const counts = categoryCounts();
  const groups = {};
  Object.entries(counts).forEach(([cat, n]) => {
    const top = cat.split('.')[0];
    if (!groups[top]) groups[top] = [];
    groups[top].push({cat, n});
  });
  const el = document.getElementById('cat-list');
  const ARXIV_GROUP_ORDER = [
    'astro-ph','cond-mat','gr-qc','hep-ex','hep-lat','hep-ph','hep-th',
    'math-ph','nlin','nucl-ex','nucl-th','physics','quant-ph',
    'math','cs','q-bio','q-fin','stat','eess','econ'
  ];
  el.innerHTML = Object.entries(groups)
    .sort(([a], [b]) => {
      const ia = ARXIV_GROUP_ORDER.indexOf(a), ib = ARXIV_GROUP_ORDER.indexOf(b);
      if (ia !== -1 && ib !== -1) return ia - ib;
      if (ia !== -1) return -1;
      if (ib !== -1) return 1;
      return a.localeCompare(b);
    })
    .map(([top, subs]) => {
      const groupTotal = subs.reduce((s, x) => s + x.n, 0);
      if (subs.length === 1) {
        const {cat, n} = subs[0];
        return `
      <div class="cat-group" id="group-${top}">
        <div class="cat-group-header" title="${catTitle(top)}">
          <input type="checkbox" id="cb-${cat}" value="${cat}" ${selectedCats.has(cat) ? 'checked' : ''}
            title="${catTitle(top)}"
            onchange="onSubCatChange('${top}', '${cat}', this.checked)">
          <span class="cat-group-label" onclick="soloCategory('${cat}')" title="${catTitle(top)}">${top}</span>
          <span class="cat-group-count" title="${catTitle(top)}">${n}</span>
        </div>
      </div>`;
      }
      const rows = subs.sort((a, b) => a.cat.localeCompare(b.cat)).map(({cat, n}) => `
        <div class="cat-item" title="${catTitle(cat)}">
          <input type="checkbox" id="cb-${cat}" value="${cat}" ${selectedCats.has(cat) ? 'checked' : ''}
            title="${catTitle(cat)}"
            onchange="onSubCatChange('${top}', '${cat}', this.checked)">
          <label for="cb-${cat}" title="${catTitle(cat)}">
            <span onclick="event.preventDefault(); soloCategory('${cat}')">${escHtml(cat)}</span><span class="cat-count">${n}</span>
          </label>
        </div>`).join('');
      return `
      <div class="cat-group" id="group-${top}">
        <div class="cat-group-header" title="${catTitle(top)}">
          <button class="collapse-btn" onclick="toggleCatGroupCollapse('${top}')" title="${catTitle(top)}">▼</button>
          <input type="checkbox" id="cb-group-${top}" checked
            title="${catTitle(top)}"
            onchange="onGroupCbChange('${top}', this.checked)">
          <span class="cat-group-label" onclick="soloGroup('${top}')" title="${catTitle(top)}">${top}</span>
          <span class="cat-group-count" title="${catTitle(top)}">${groupTotal}</span>
        </div>
        <div class="cat-group-items" id="items-${top}">${rows}</div>
      </div>`;
    }).join('');
  Object.keys(groups).forEach(top => updateGroupCb(top));
}

function toggleCatGroupCollapse(top) {
  const items = document.getElementById(`items-${top}`);
  const btn = document.querySelector(`#group-${top} .collapse-btn`);
  items.classList.toggle('collapsed');
  btn.textContent = items.classList.contains('collapsed') ? '▶' : '▼';
}

function soloCategory(cat) {
  // Deselect all, then select only this one category
  document.querySelectorAll('#cat-list input[type="checkbox"][value]').forEach(cb => {
    cb.checked = false;
    cb.indeterminate = false;
    selectedCats.delete(cb.value);
  });
  selectedCats.add(cat);
  const cb = document.getElementById(`cb-${cat}`);
  if (cb) cb.checked = true;
  document.querySelectorAll('.cat-group').forEach(g => updateGroupCb(g.id.replace('group-', '')));
  render();
}

function soloGroup(top) {
  // Deselect all, then select all subcategories of this group
  document.querySelectorAll('#cat-list input[type="checkbox"][value]').forEach(cb => {
    cb.checked = false;
    cb.indeterminate = false;
    selectedCats.delete(cb.value);
  });
  document.querySelectorAll(`#items-${top} input[type="checkbox"]`).forEach(cb => {
    cb.checked = true;
    selectedCats.add(cb.value);
  });
  document.querySelectorAll('.cat-group').forEach(g => updateGroupCb(g.id.replace('group-', '')));
  render();
}

function onGroupCbChange(top, checked) {
  setGroupState(top, checked);
}

function setGroupState(top, checked) {
  const subs = document.querySelectorAll(`#items-${top} input[type="checkbox"]`);
  subs.forEach(cb => {
    cb.checked = checked;
    if (checked) selectedCats.add(cb.value);
    else selectedCats.delete(cb.value);
  });
  updateGroupCb(top);
  render();
}

function onSubCatChange(top, cat, checked) {
  if (checked) selectedCats.add(cat); else selectedCats.delete(cat);
  updateGroupCb(top);
  render();
}

function updateGroupCb(top) {
  const cb = document.getElementById(`cb-group-${top}`);
  if (!cb) return;
  const subs = [...document.querySelectorAll(`#items-${top} input[type="checkbox"]`)];
  const checkedCount = subs.filter(s => s.checked).length;
  if (checkedCount === 0) { cb.checked = false; cb.indeterminate = false; }
  else if (checkedCount === subs.length) { cb.checked = true; cb.indeterminate = false; }
  else { cb.checked = false; cb.indeterminate = true; }
}

function onCatSearch(val) {
  const q = val.trim().toLowerCase();
  document.querySelectorAll('.cat-group').forEach(group => {
    const top = group.id.replace('group-', '');
    let anyVisible = false;
    group.querySelectorAll('.cat-item').forEach(item => {
      const cb = item.querySelector('input[type="checkbox"]');
      const cat = cb ? cb.value : '';
      const matches = !q || cat.toLowerCase().includes(q) || catTitle(cat).toLowerCase().includes(q);
      item.style.display = matches ? '' : 'none';
      if (matches) anyVisible = true;
    });
    group.style.display = anyVisible ? '' : 'none';
    // Expand groups when searching so results are visible
    if (q && anyVisible) {
      document.getElementById(`items-${top}`)?.classList.remove('collapsed');
      const btn = group.querySelector('.collapse-btn');
      if (btn) btn.textContent = '▼';
    }
  });
}

function matchesStartup(cat) {
  if (!startupCats.length) return true;
  const c = cat.toLowerCase();
  const top = c.split('.')[0];
  return startupCats.includes(c) || startupCats.includes(top);
}

function selectStartupCats() {
  document.querySelectorAll('#cat-list input[type="checkbox"][value]').forEach(cb => {
    const on = matchesStartup(cb.value);
    cb.checked = on; cb.indeterminate = false;
    if (on) selectedCats.add(cb.value); else selectedCats.delete(cb.value);
  });
  document.querySelectorAll('.cat-group').forEach(g => updateGroupCb(g.id.replace('group-', '')));
  render();
}

function selectAllCats() {
  document.querySelectorAll('#cat-list input[type="checkbox"]').forEach(cb => {
    cb.checked = true; cb.indeterminate = false;
    if (cb.value) selectedCats.add(cb.value);
  });
  render();
}

function selectNoneCats() {
  document.querySelectorAll('#cat-list input[type="checkbox"]').forEach(cb => {
    cb.checked = false; cb.indeterminate = false;
    if (cb.value) selectedCats.delete(cb.value);
  });
  render();
}

let _authorMenu = null;

function openAuthorMenu(event, name) {
  event.stopPropagation();
  closeAuthorMenu();

  const menu = document.createElement('div');
  menu.className = 'author-menu';
  menu.id = 'author-menu';

  const title = document.createElement('div');
  title.className = 'author-menu-name';
  title.textContent = name;
  menu.appendChild(title);

  const followBtn = document.createElement('button');
  followBtn.className = 'author-menu-item';
  followBtn.textContent = followedAuthors.has(name) ? 'Unfollow' : 'Follow';
  followBtn.onclick = (e) => { e.stopPropagation(); doFollowToggle(name); closeAuthorMenu(); };
  menu.appendChild(followBtn);

  const scholarBtn = document.createElement('button');
  scholarBtn.className = 'author-menu-item';
  scholarBtn.textContent = 'Scholar';
  scholarBtn.onclick = (e) => { e.stopPropagation(); window.open(`https://scholar.google.com/scholar?q=author:"${encodeURIComponent(name)}"`, '_blank'); closeAuthorMenu(); };
  menu.appendChild(scholarBtn);

  const inspireBtn = document.createElement('button');
  inspireBtn.className = 'author-menu-item';
  inspireBtn.textContent = 'Inspire';
  inspireBtn.onclick = (e) => { e.stopPropagation(); window.open(`https://inspirehep.net/authors?sort=bestmatch&size=5&page=1&q=${encodeURIComponent(name)}`, '_blank'); closeAuthorMenu(); };
  menu.appendChild(inspireBtn);

  const arxivBtn = document.createElement('button');
  arxivBtn.className = 'author-menu-item';
  arxivBtn.textContent = 'arXiv';
  arxivBtn.onclick = (e) => { e.stopPropagation(); window.open(`https://arxiv.org/search/?searchtype=author&query=${encodeURIComponent(name)}`, '_blank'); closeAuthorMenu(); };
  menu.appendChild(arxivBtn);

  // Position near the click
  document.body.appendChild(menu);
  const x = Math.min(event.clientX, window.innerWidth - menu.offsetWidth - 8);
  const y = Math.min(event.clientY + 4, window.innerHeight - menu.offsetHeight - 8);
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';

  _authorMenu = menu;
  setTimeout(() => document.addEventListener('click', closeAuthorMenu, {once: true}), 0);
}

function closeAuthorMenu() {
  if (_authorMenu) { _authorMenu.remove(); _authorMenu = null; }
}

async function doFollowToggle(name) {
  const ep = followedAuthors.has(name) ? '/api/authors/unfollow' : '/api/authors/follow';
  const d = await apiPost(ep, {name});
  followedAuthors = new Set(d.authors);
  renderFollowedSidebar();
  render();
}

function unfollowAuthor(name) { return doFollowToggle(name); }

async function addAuthor() {
  const el = document.getElementById('author-name');
  const name = el.value.trim();
  if (!name) return;
  const d = await apiPost('/api/authors/follow', {name});
  followedAuthors = new Set(d.authors);
  el.value = '';
  renderFollowedSidebar();
  render();
}

function renderKeywordSidebar() {
  const el = document.getElementById('keyword-list');
  if (!keywords.length) {
    el.innerHTML = `<span class="empty-note">no keywords yet</span>`;
    return;
  }
  const rows = keywords.map(name => {
    const lower = name.toLowerCase();
    const count = papers.filter(p =>
      ((p.title||'') + ' ' + (p.abstract||'')).toLowerCase().includes(lower)
    ).length;
    return {name, count};
  }).sort((a, b) => b.count - a.count);

  el.innerHTML = rows.map(({name, count}) => `
    <div class="item-row">
      <span class="item-name">${escHtml(name)}</span>
      <span class="item-weight">${count}</span>
      <button class="rm-btn" onclick="removeKeyword('${escHtml(name)}')" title="remove">✕</button>
    </div>`).join('');
}

async function addKeyword() {
  const nameEl = document.getElementById('kw-name');
  const name = nameEl.value.trim().toLowerCase();
  if (!name) return;
  const d = await apiPost('/api/keywords/add', {name});
  keywords = d.keywords;
  nameEl.value = '';
  renderKeywordSidebar();
  render();
}

async function removeKeyword(name) {
  const d = await apiPost('/api/keywords/remove', {name});
  keywords = d.keywords;
  renderKeywordSidebar();
  render();
}

async function toggleReadingList(event, paperId) {
  event.stopPropagation();
  const ep = readingListIds.has(baseId(paperId)) ? '/api/reading_list/remove' : '/api/reading_list/add';
  const body = readingListIds.has(baseId(paperId))
    ? {id: paperId}
    : {paper: papers.find(p => p.id === paperId)};
  const d = await apiPost(ep, body);
  readingListIds = new Set(d.ids.map(baseId));
  updateRlCount();
  buildCategoryList();
  render();
}

/* ── Search ── */

function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = val.trim().toLowerCase(); render(); }, 180);
}

function searchTerms() {
  // Split on && — each segment is a required phrase
  return searchQuery.split('&&').map(s => s.trim()).filter(Boolean);
}

function matchesSearch(p) {
  if (!searchQuery) return true;
  const hay = [p.title||'', p.abstract||'', ...(p.authors||[]), ...(p.categories||[])].join(' ').toLowerCase();
  return searchTerms().every(phrase => hay.includes(phrase));
}

/* ── Filter & sort ── */

function filtered() {
  const onlyFollowed = document.getElementById('cb-followed')?.checked;
  const onlyKeywords = document.getElementById('cb-keywords')?.checked;
  let result = papers.filter(p => {
    if (!(p.categories||[]).some(c => selectedCats.has(c))) return false;
    if (!matchesSearch(p)) return false;
    if (onlyFollowed && !(p.authors||[]).some(a => followedAuthors.has(a))) return false;
    if (onlyKeywords && cachedScore(p).score === 0) return false;
    return true;
  });

  // When keyword filter is on, sort by keyword score descending
  if (onlyKeywords) {
    result = result.map(p => ({p, ks: cachedScore(p)}))
      .sort((a, b) => b.ks.score - a.ks.score)
      .map(({p}) => p);
  }

  return result;
}

/* ── Render ── */

function authorSpans(arr, max) {
  const shown = arr.slice(0, max);
  let html = shown.map((a, i) => {
    const followed = followedAuthors.has(a);
    const comma = (i < shown.length - 1 || arr.length > max) ? ', ' : '';
    return `<span class="author-name ${followed ? 'followed' : ''}"
      onclick="openAuthorMenu(event,'${escHtml(a)}')"
      title="${escHtml(a)}">${highlight(a)}</span>${comma}`;
  }).join('');
  if (arr.length > max) html += '<span> et al.</span>';
  return html;
}

function buildAuthors(arr) {
  // Collapsed: up to 10 authors. Expanded: up to 30 authors.
  return `<span class="authors-short">${authorSpans(arr, 10)}</span>`
       + `<span class="authors-full">${authorSpans(arr, 30)}</span>`;
}

function render() {
  _scoreCache.clear();
  sessionStorage.setItem('selectedCats', JSON.stringify([...selectedCats]));
  allExpanded = false;
  const btn = document.getElementById('btn-expand-all');
  if (btn) btn.textContent = 'expand all';

  const shown = filtered();
  document.getElementById('stats').textContent = `${shown.length} / ${papers.length} papers`;

  const el = document.getElementById('papers');
  if (!shown.length) { el.innerHTML = '<div class="loading">no papers match</div>'; return; }

  function paperHtml(entry) {
    const p = entry.p || entry;
    const submissionType = entry.type || p.submission_type || 'new';
    const hasFollowed = (p.authors||[]).some(a => followedAuthors.has(a));
    const {score: kwScore, matched: kwMatched} = cachedScore(p);
    const hasKw = kwScore > 0;
    const bookmarked = readingListIds.has(baseId(p.id));

    const cls = [hasFollowed ? 'has-followed' : '', hasKw ? 'has-keyword' : ''].filter(Boolean).join(' ');

    const authorsHtml = buildAuthors(p.authors||[]);

    const kwHtml = hasKw ? `<div class="kw-matches">
      <span class="kw-score">keywords:</span>
      ${kwMatched.map(k => `<span>${escHtml(k)}</span>`).join(', ')}
    </div>` : '';

    return `
    <div class="paper ${cls}" id="paper-${p.id}" onclick="toggleExpand(this,event)">
      <div class="paper-title">
        <a href="${p.url}" target="_blank" onclick="event.stopPropagation()">${highlight(p.title||'')}</a>
      </div>
      <div class="paper-authors">${authorsHtml}</div>
      <div class="paper-meta">
        <span class="primary-cat" title="${catTitle(p.primary_category||'')}">${escHtml(p.primary_category||'')}</span>
        <span>${(p.categories||[]).filter(c=>c!==p.primary_category).map(c=>`<span title="${catTitle(c)}">${escHtml(c)}</span>`).join(' ')}</span>
        <span>${p.published?p.published.slice(0,10):''}</span>
        ${(()=>{const t=submissionType; const label={new:'new',cross:'cross',replacement:'replacement'}[t]||t; return `<span class="type-badge type-${t}">${label}</span>`;})()}
      </div>
      ${kwHtml}
      <div class="paper-abstract">${highlight(p.abstract||'')}</div>
      <div class="paper-links">
        <a class="action-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation()">abstract</a>
        ${p.pdf_url?`<a class="action-btn" href="${p.pdf_url}" target="_blank" onclick="event.stopPropagation()">pdf</a>`:''}
        <button class="action-btn ${bookmarked ? 'bookmarked' : ''}"
          onclick="toggleReadingList(event, '${escHtml(p.id)}')"
          title="${bookmarked ? 'remove from reading list' : 'add to reading list'}">
          ${bookmarked ? '★ saved' : '☆ save'}
        </button>
      </div>
    </div>`;
  }

  shown.sort((a, b) => {
    const aF = (a.authors||[]).some(x => followedAuthors.has(x));
    const bF = (b.authors||[]).some(x => followedAuthors.has(x));
    if (aF !== bF) return aF ? -1 : 1;
    return cachedScore(b).score - cachedScore(a).score;
  });

  const entries = expandForGrouping(shown);

  if (groupOrder.length === 0) {
    el.innerHTML = entries.map(paperHtml).join('');
  } else if (groupOrder.length === 1) {
    const [d] = groupOrder;
    el.innerHTML = sortedGroups(groupBy(entries, e => dimKeyEntry(e, d)), d)
      .map(([key, es]) =>
        headerHtml(d, key, es.length, 1) +
        groupBodyOpen(d, key) + es.map(paperHtml).join('') + '</div>'
      ).join('');
  } else {
    const [d1, d2] = groupOrder;
    el.innerHTML = sortedGroups(groupBy(entries, e => dimKeyEntry(e, d1)), d1)
      .map(([k1, es1]) => {
        const pid = groupId(d1, k1);
        return headerHtml(d1, k1, es1.length, 1) +
          groupBodyOpen(d1, k1) +
          sortedGroups(groupBy(es1, e => dimKeyEntry(e, d2)), d2)
            .map(([k2, es2]) =>
              headerHtml(d2, k2, es2.length, 2, pid) +
              groupBodyOpen(d2, k2, pid) + es2.map(paperHtml).join('') + '</div>'
            ).join('') +
          '</div>';
      }).join('');
  }

  loadKatex();
}

function toggleExpand(el, e) {
  if (e.target.closest('.paper-links') || e.target.tagName==='A' || e.target.classList.contains('author-name')) return;
  el.classList.toggle('expanded');
  if (el.classList.contains('expanded')) loadKatex();
}

let allExpanded = false;
let groupOrder = JSON.parse(sessionStorage.getItem('groupOrder') || '[]');
let collapsedGroups = new Set(); // group ids currently collapsed

const TYPE_ORDER = ['new', 'cross', 'replacement'];
const TYPE_LABELS = {new: 'New Submissions', cross: 'Cross Submissions', replacement: 'Replacement Submissions'};

const ARXIV_FIELD_ORDER = [
  'astro-ph','cond-mat','gr-qc','hep-ex','hep-lat','hep-ph','hep-th',
  'math-ph','nlin','nucl-ex','nucl-th','physics','quant-ph',
  'math','cs','q-bio','q-fin','stat','eess','econ'
];

function fieldSortIndex(top) {
  // Derive top-level order from startupCats, preserving first-seen order
  const startupTops = [];
  const seen = new Set();
  startupCats.forEach(c => {
    const t = c.split('.')[0];
    if (!seen.has(t)) { seen.add(t); startupTops.push(t); }
  });
  const si = startupTops.indexOf(top);
  if (si !== -1) return si;
  const ai = ARXIV_FIELD_ORDER.indexOf(top);
  if (ai !== -1) return startupTops.length + ai;
  return startupTops.length + ARXIV_FIELD_ORDER.length;
}

function toggleGroup(dim) {
  if (groupOrder.includes(dim)) {
    groupOrder = groupOrder.filter(d => d !== dim);
  } else {
    groupOrder.push(dim);
  }
  sessionStorage.setItem('groupOrder', JSON.stringify(groupOrder));
  document.getElementById('btn-sep-fields').classList.toggle('sb-btn-active', groupOrder.includes('field'));
  document.getElementById('btn-sep-type').classList.toggle('sb-btn-active', groupOrder.includes('type'));
  render();
}

function groupBy(arr, keyFn) {
  const map = new Map();
  arr.forEach(p => {
    const k = keyFn(p);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(p);
  });
  return map;
}

function sortedGroups(map, dim) {
  const entries = [...map.entries()];
  if (dim === 'type')  return entries.sort((a, b) => TYPE_ORDER.indexOf(a[0]) - TYPE_ORDER.indexOf(b[0]));
  if (dim === 'field') return entries.sort((a, b) => fieldSortIndex(a[0]) - fieldSortIndex(b[0]));
  return entries;
}

function dimKey(p, dim) {
  if (dim === 'field') return (p.primary_category || 'other').split('.')[0];
  if (dim === 'type')  return p.submission_type || 'new';
}

function dimKeyEntry(entry, dim) {
  return dim === 'field' ? entry.field : entry.type;
}

function fieldHasSelectedCat(field) {
  for (const c of selectedCats) { if (c.split('.')[0] === field) return true; }
  return false;
}

function expandForGrouping(papers) {
  if (!groupOrder.length) {
    return papers.map(p => ({p, field: dimKey(p, 'field'), type: p.submission_type || 'new'}));
  }
  const result = [];
  papers.forEach(p => {
    const apps = (p.appearances && p.appearances.length)
      ? p.appearances
      : [{category: p.primary_category || 'other', type: p.submission_type || 'new'}];

    const seen = new Set();
    apps.forEach(app => {
      const field = (app.category || 'other').split('.')[0];
      const type  = app.type || 'new';

      // Skip appearances whose field has no selected category
      if (groupOrder.includes('field') && !fieldHasSelectedCat(field)) return;

      // Dedup by the active grouping dimensions only
      const key = groupOrder.map(d => d === 'field' ? field : type).join('|');
      if (!seen.has(key)) {
        seen.add(key);
        result.push({p, field, type});
      }
    });
  });
  return result;
}

function dimLabel(dim, key) {
  if (dim === 'field') return catTitle(key);
  if (dim === 'type')  return TYPE_LABELS[key] || key;
}

function groupId(dim, key, parentId='') { return parentId ? `${parentId}__${dim}-${key}` : `grp-${dim}-${key}`; }

function headerHtml(dim, key, count, level, parentId='') {
  const cls = level === 1 ? 'group-header-l1' : 'group-header-l2';
  const gid = groupId(dim, key, parentId);
  const arrow = collapsedGroups.has(gid) ? '▶' : '▼';
  return `<div class="${cls}" onclick="toggleGroupCollapse('${gid}')"><span class="group-arrow">${arrow}</span>${escHtml(dimLabel(dim, key))}<span class="group-count">${count} paper${count !== 1 ? 's' : ''}</span></div>`;
}

function groupBodyOpen(dim, key, parentId='') {
  const gid = groupId(dim, key, parentId);
  return `<div id="${gid}"${collapsedGroups.has(gid) ? ' style="display:none"' : ''}>`;
}

function toggleGroupCollapse(gid) {
  if (collapsedGroups.has(gid)) collapsedGroups.delete(gid);
  else collapsedGroups.add(gid);
  const el = document.getElementById(gid);
  if (el) {
    el.style.display = collapsedGroups.has(gid) ? 'none' : '';
    const header = el.previousElementSibling;
    if (header) {
      const arrow = header.querySelector('.group-arrow');
      if (arrow) arrow.textContent = collapsedGroups.has(gid) ? '▶' : '▼';
    }
  }
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  sessionStorage.setItem('allExpanded', allExpanded);
  document.querySelectorAll('.paper').forEach(p => p.classList.toggle('expanded', allExpanded));
  document.getElementById('btn-expand-all').textContent = allExpanded ? 'collapse all' : 'expand all';
  if (allExpanded) loadKatex();
}

function expandAll() {
  allExpanded = true;
  document.querySelectorAll('.paper').forEach(p => p.classList.add('expanded'));
  const btn = document.getElementById('btn-expand-all');
  if (btn) btn.textContent = 'collapse all';
  loadKatex();
}

function collapseAll() {
  allExpanded = false;
  document.querySelectorAll('.paper').forEach(p => p.classList.remove('expanded'));
  const btn = document.getElementById('btn-expand-all');
  if (btn) btn.textContent = 'expand all';
}

function toggleSection(titleEl) {
  const body = titleEl.nextElementSibling;
  const arrow = titleEl.querySelector('.section-arrow');
  const collapsed = body.classList.toggle('collapsed');
  arrow.textContent = collapsed ? '▶' : '▼';
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.querySelector('.sidebar-backdrop').classList.toggle('open');
}

/* ── Swipe-to-open sidebar (mobile) ── */
(function () {
  const EDGE_ZONE = 28;   // px from left edge that starts an open swipe
  const THRESHOLD = 55;   // px drag needed to commit open/close

  const sidebar = document.querySelector('.sidebar');
  const backdrop = document.querySelector('.sidebar-backdrop');

  let startX = 0, startY = 0, dragging = false, isOpen = false;

  function setOpen(open) {
    isOpen = open;
    sidebar.style.transition = '';
    sidebar.style.transform = '';
    sidebar.classList.toggle('open', open);
    backdrop.classList.toggle('open', open);
  }

  document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    isOpen = sidebar.classList.contains('open');
    dragging = isOpen || startX <= EDGE_ZONE;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const t = e.touches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    // Ignore mostly-vertical swipes
    if (!isOpen && Math.abs(dy) > Math.abs(dx) * 1.5) { dragging = false; return; }
    const sidebarW = sidebar.offsetWidth;
    const offset = isOpen ? Math.min(0, dx) : Math.min(0, dx + sidebarW) ;
    sidebar.style.transition = 'none';
    sidebar.style.transform = `translateX(${offset}px)`;
    if (!isOpen && dx > 0) {
      backdrop.classList.add('open');
      backdrop.style.opacity = Math.min(1, dx / sidebarW);
    } else if (isOpen) {
      backdrop.style.opacity = 1 + offset / sidebarW;
    }
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (!dragging) return;
    dragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    sidebar.style.transition = '';
    sidebar.style.transform = '';
    backdrop.style.opacity = '';
    if (!isOpen && dx > THRESHOLD) setOpen(true);
    else if (isOpen && dx < -THRESHOLD) setOpen(false);
    else setOpen(isOpen); // snap back
  });
})();

load();
</script>
